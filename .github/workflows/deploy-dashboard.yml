name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # нужно для push в GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # автоматически, ничего настраивать не нужно

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: true
          tags: ghcr.io/dnikulshin/scan-agent/dashboard:latest
          cache-from: type=gha          # кеш слоёв между запусками — бесплатно
          cache-to: type=gha,mode=max

      - name: Trigger deploy on VPS
        run: |
          curl -f -X POST https://webhook.nikulshin-dev.online/hooks/deploy-scan-agent \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -d '{"ref":"refs/heads/main"}'
