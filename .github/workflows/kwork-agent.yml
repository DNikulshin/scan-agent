name: Kwork Agent

on:
  schedule:
    - cron: '*/30 * * * *'  # каждые 30 минут
  workflow_dispatch:         # ручной запуск из GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore processed IDs cache
        uses: actions/cache@v4
        with:
          path: processed_ids.json
          key: processed-ids-${{ github.run_id }}
          restore-keys: |
            processed-ids-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          KWORK_SEARCH_URL: ${{ secrets.KWORK_SEARCH_URL }}
        run: npx ts-node index.ts

      - name: Save processed IDs cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: processed_ids.json
          key: processed-ids-${{ github.run_id }}